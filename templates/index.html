<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Cost Engine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        :root { --bg: #0b0e11; --card: #151921; --blue: #007aff; --border: #2c333d; }
        body { background: var(--bg); color: #f8f9fa; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .intro-text { 
            font-family: 'Syncopate', sans-serif; font-size: 2.5rem; letter-spacing: 8px; 
            color: #fff; text-transform: uppercase; animation: intro-pulse 2s ease-out forwards; 
        }
        @keyframes intro-pulse { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        /* --- CONTENT WRAPPER --- */
        #main-wrapper { opacity: 0; transition: opacity 1.2s ease; }
        .show-content { opacity: 1 !important; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
        .btn-primary { background: var(--blue); border: none; font-weight: 600; padding: 12px; }
        .verdict-box { border-left: 4px solid var(--blue); background: rgba(0,122,255,0.05); padding: 20px; border-radius: 4px; }
        .custom-tooltip { --bs-tooltip-bg: var(--bg); --bs-tooltip-color: #fff; }
    </style>
</head>
<body class="py-5">

    <div id="splash"><div class="intro-text">  </div></div>

    <div class="container" id="main-wrapper">
        <header class="pb-3 mb-5 border-bottom border-secondary d-flex justify-content-between align-items-center">
            <h1 class="fs-4 fw-bold text-primary m-0">OPPORTUNITY COST ENGINE</h1>
            <span class="badge bg-dark border border-secondary text-muted">OCE</span>
        </header>

        <div class="row g-5">
            <div class="col-lg-4">
                <div class="card p-4">
                    <form id="calcForm">
                        <div class="mb-3">
                            <label class="form-label">What are you buying?</label>
                            <input type="text" class="form-control" id="productName" placeholder="e.g. My new iPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Search Investment Ticker</label>
                            <input class="form-control" list="companyList" id="companyInput" placeholder="Type to search..." required autocomplete="off">
                            <datalist id="companyList">
                                {% for co in companies %}<option value="{{ co.name }}" data-ticker="{{ co.ticker }}">{% endfor %}
                            </datalist>
                        </div>
                        <input type="hidden" id="ticker">

                        <div class="mb-3">
                            <label class="form-label">Price (£)</label>
                            <input type="number" step="0.01" class="form-control" id="price" required>
                        </div>

                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="isSub">
                            <label class="form-check-label">Monthly Subscription?</label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Prediction Model</label>
                            <select class="form-select" id="modelType">
                                <option value="historical">Historical Trend (CAGR)</option>
                                <option value="GBM">Geometric Brownian Motion</option>
                                <option value="NB_AI">News-based AI (RAAS Intelligence)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between">
                                <span>Horizon</span> <span class="text-primary fw-bold" id="yrDisp">5 Years</span>
                            </label>
                            <input type="range" class="form-range" id="years" min="1" max="10" value="5" step="0.25">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">RUN ANALYTICS</button>
                    </form>
                    <p class="mt-4 text-center text-muted small">This is not financial advice blud.</p>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-4 mb-4">
                    <canvas id="mainChart" height="150"></canvas>
                    <div id="chartPlaceholder" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #8e96a3; font-weight: 600; font-size: 1.2rem; text-align: center;">
                        <h1>Enter values to generate chart</h1>
                    </div>
                </div>

                <div class="row g-3 mb-4 text-center">
                    <div class="col-md-4">
                        <div class="card p-3">
                            <small class="text-muted" style="text-decoration: underline; text-decoration-style: dotted;" data-bs-toggle="tooltip" title="The year in which the profits from investment would 'pay' for the item">Free Item Milestone</small>
                            <div class="h4 mb-0 text-success" id="mileOut">--</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3">
                            <small class="text-muted" style="text-decoration: underline; text-decoration-style: dotted;" data-bs-toggle="tooltip" title="The next best alternative">Opportunity Cost</small>
                            <div class="h4 mb-0 text-primary" id="eqOut">£0.00</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3">
                            <small class="text-muted" style="text-decoration: underline; text-decoration-style: dotted;" data-bs-toggle="tooltip" title="Predicted resale value of the physical item.">Final Asset Value</small>
                            <div class="h4 mb-0 text-danger" id="assetOut">£0.00</div>
                        </div>
                    </div>
                </div>

                <div id="vBox" class="verdict-box text-center d-none">
                    <h6 class="fw-bold mb-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bank2" viewBox="0 0 16 16">
                    <path d="M8.277.084a.5.5 0 0 0-.554 0l-7.5 5A.5.5 0 0 0 .5 6h1.875v7H1.5a.5.5 0 0 0 0 1h13a.5.5 0 1 0 0-1h-.875V6H15.5a.5.5 0 0 0 .277-.916zM12.375 6v7h-1.25V6zm-2.5 0v7h-1.25V6zm-2.5 0v7h-1.25V6zm-2.5 0v7h-1.25V6zM8 4a1 1 0 1 1 0-2 1 1 0 0 1 0 2M.5 15a.5.5 0 0 0 0 1h15a.5.5 0 1 0 0-1z"/>
                    </svg> Financial Verdict</h6>
                    <p id="vText" class="m-0 text-muted"></p>
                </div>
                <div id="extraBox" class="verdict-box mt-3 text-center d-none">
                    <h6 class="fw-bold mb-2">Context</h6>
                    <p id="extraText" class="m-0 text-muted">read more</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
