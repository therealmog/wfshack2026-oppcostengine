<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Opportunity Cost Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #151921; --blue: #007aff; --border: #2c333d; }
        body { background: var(--bg); color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
        .btn-primary { background: var(--blue); border: none; font-weight: 600; padding: 12px; }
        .verdict-box { border-left: 4px solid var(--blue); background: rgba(0,122,255,0.05); padding: 20px; border-radius: 4px; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <header class="pb-3 mb-5 border-bottom border-secondary">
            <h1 class="fs-4 fw-bold text-primary">THE OPPORTUNITY COST ENGINE</h1>
        </header>

        <div class="row g-5">
            <div class="col-lg-4">
                <div class="card p-4">
                    <form id="calcForm">
                        <div class="mb-3">
                            <label class="form-label">What are you buying?</label>
                            <input type="text" class="form-control" id="productName" placeholder="e.g. My new iPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Search Investment Ticker</label>
                            <input class="form-control" list="companyList" id="companyInput" placeholder="Type to search..." required>
                            <datalist id="companyList">
                                {% for co in companies %}<option value="{{ co.name }}" data-ticker="{{ co.ticker }}">{% endfor %}
                            </datalist>
                        </div>
                        <input type="hidden" id="ticker">
                        <div class="mb-3">
                            <label class="form-label">Price (£)</label>
                            <input type="number" step="0.01" class="form-control" id="price" required>
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="isSub">
                            <label class="form-check-label">Monthly Subscription?</label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between">
                                <span>Horizon</span> <span class="text-primary fw-bold" id="yrDisp">5 Years</span>
                            </label>
                            <input type="range" class="form-range" id="years" min="1" max="10" value="5">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">RUN ANALYTICS</button>
                    </form>
                    <br>
                    <p>This is not financial advice blud</p>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card p-4 mb-4"><canvas id="mainChart" height="150"></canvas></div>
                <div class="row g-3 mb-4 text-center">
                    <div class="col-6"><div class="card p-3"><small class="text-muted">"Free" item Milestone</small><div class="h4 mb-0 text-success" id="mileOut">--</div></div></div>
                    <div class="col-6"><div class="card p-3"><small class="text-muted">Opportunity Cost</small><div class="h4 mb-0 text-primary" id="eqOut">£0.00</div></div></div>
                </div>
                <div id="vBox" class="verdict-box d-none"><h6 class="fw-bold mb-2">Verdict</h6><p id="vText" class="m-0 text-muted"></p></div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
